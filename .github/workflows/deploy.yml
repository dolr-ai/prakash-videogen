name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      host:
        description: "Vast.ai Host IP"
        required: true
        type: string
      port:
        description: "Vast.ai SSH Port"
        required: true
        type: string
      run_setup:
        description: "Run setup.sh (installs models/nodes)"
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: videogen-worker

jobs:
  build:
    name: Build (linux-amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: videogen-worker-linux-amd64
          path: target/x86_64-unknown-linux-gnu/release/videogen-worker
          retention-days: 7

  deploy:
    name: Deploy to Vast.ai
    needs: build
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy)
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: videogen-worker-linux-amd64
          path: ./bin

      - name: Make binary executable
        run: chmod +x ./bin/videogen-worker

      - name: Resolve Vast.ai connection
        id: resolve
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "host=${{ github.event.inputs.host }}" >> $GITHUB_OUTPUT
            echo "port=${{ github.event.inputs.port }}" >> $GITHUB_OUTPUT
            echo "run_setup=${{ github.event.inputs.run_setup }}" >> $GITHUB_OUTPUT
          else
            echo "host=${{ secrets.VASTAI_HOST }}" >> $GITHUB_OUTPUT
            echo "port=${{ secrets.VASTAI_PORT }}" >> $GITHUB_OUTPUT
            echo "run_setup=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VASTAI_SSH_KEY }}" > ~/.ssh/vastai
          chmod 600 ~/.ssh/vastai
          echo -e "Host vastai\n  HostName ${{ steps.resolve.outputs.host }}\n  Port ${{ steps.resolve.outputs.port }}\n  User root\n  IdentityFile ~/.ssh/vastai\n  StrictHostKeyChecking no" > ~/.ssh/config

      - name: Deploy files
        run: |
          scp ./bin/videogen-worker vastai:/workspace/videogen-worker
          scp ./deploy/start.sh vastai:/workspace/start.sh
          scp ./deploy/setup.sh vastai:/workspace/setup.sh

      - name: Run Setup (Optional)
        if: steps.resolve.outputs.run_setup == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          ssh vastai "HF_TOKEN=${HF_TOKEN} bash /workspace/setup.sh"

      - name: Start services
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
        run: |
          ssh vastai << 'DEPLOY_EOF'
            set -e

            # Stop existing services
            tmux kill-session -t worker 2>/dev/null || true
            tmux kill-session -t tunnel 2>/dev/null || true

            chmod +x /workspace/videogen-worker /workspace/start.sh

            # Export env vars for start.sh
            export AUTH_TOKEN="${{ secrets.AUTH_TOKEN }}"
            export SENTRY_DSN="${{ secrets.SENTRY_DSN }}"
            export CF_TUNNEL_TOKEN="${{ secrets.CF_TUNNEL_TOKEN }}"

            # Ensure worker starts on port 18288
            export PORT=18288
            export COMFYUI_API_BASE=http://localhost:18188

            bash /workspace/start.sh

            echo "=== Deployment complete ==="
          DEPLOY_EOF

      - name: Verify deployment
        run: |
          echo "Waiting for worker to start..."
          sleep 10
          ssh vastai "curl -sf http://localhost:18288/health | jq ." || echo "Worker health check failed (might still be starting or model loading)"

name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to Vast.ai after build"
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: videogen-worker

jobs:
  build:
    name: Build (linux-amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: videogen-worker-linux-amd64
          path: target/x86_64-unknown-linux-gnu/release/videogen-worker
          retention-days: 7

  deploy:
    name: Deploy to Vast.ai
    needs: build
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy)
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: videogen-worker-linux-amd64
          path: ./bin

      - name: Make binary executable
        run: chmod +x ./bin/videogen-worker

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VASTAI_SSH_KEY }}" > ~/.ssh/vastai
          chmod 600 ~/.ssh/vastai
          echo -e "Host vastai\n  HostName ${{ secrets.VASTAI_HOST }}\n  Port ${{ secrets.VASTAI_PORT }}\n  User root\n  IdentityFile ~/.ssh/vastai\n  StrictHostKeyChecking no" > ~/.ssh/config

      - name: Deploy binary
        run: |
          scp ./bin/videogen-worker vastai:/workspace/videogen-worker
          scp ./deploy/start.sh vastai:/workspace/start.sh

      - name: Start services
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
        run: |
          ssh vastai << 'DEPLOY_EOF'
            set -e

            # Stop existing services
            tmux kill-session -t worker 2>/dev/null || true
            tmux kill-session -t tunnel 2>/dev/null || true

            chmod +x /workspace/videogen-worker /workspace/start.sh

            # Export env vars for start.sh
            export AUTH_TOKEN="${{ secrets.AUTH_TOKEN }}"
            export SENTRY_DSN="${{ secrets.SENTRY_DSN }}"
            export CF_TUNNEL_TOKEN="${{ secrets.CF_TUNNEL_TOKEN }}"

            bash /workspace/start.sh

            echo "=== Deployment complete ==="
            echo "Health check:"
            sleep 3
            curl -sf http://localhost:8288/health || echo "Worker still starting..."
          DEPLOY_EOF

      - name: Verify deployment
        run: |
          sleep 5
          ssh vastai "curl -sf http://localhost:8288/health | jq ."
